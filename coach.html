<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launch Coach | St. Pete Bible Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#2AABB3;--teal-dark:#1B7A80;--teal-deep:#145A5E;
      --pink:#E88CA0;--gold:#E8B84B;--sand:#FDF6EE;
      --slate:#2D3436;--gray-100:#F1F4F8;--gray-300:#D1D8E0;
      --gray-500:#8E99A4;--gray-600:#636E72;--white:#FFFFFF;
      --radius:16px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Karla',-apple-system,sans-serif;background:var(--gray-100);color:var(--slate);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
    h1,h2,h3,h4{font-family:'Rubik',sans-serif;}

    /* AUTH GATE */
    .auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;background:var(--sand);}
    .auth-gate h1{font-size:2rem;margin-bottom:8px;}
    .auth-gate p{font-size:1.05rem;color:var(--gray-500);margin-bottom:32px;}
    .auth-gate a{padding:16px 32px;background:var(--teal);color:white;border-radius:12px;text-decoration:none;font-weight:700;}

    /* API KEY MODAL */
    .key-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;}
    .key-modal{background:white;border-radius:20px;padding:40px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
    .key-modal h2{font-size:1.4rem;margin-bottom:8px;}
    .key-modal p{font-size:0.9rem;color:var(--gray-500);margin-bottom:20px;line-height:1.5;}
    .key-modal input{width:100%;padding:14px 18px;border:2px solid var(--gray-100);border-radius:12px;font-size:0.95rem;font-family:inherit;margin-bottom:16px;}
    .key-modal input:focus{outline:none;border-color:var(--teal);}
    .key-modal button{width:100%;padding:16px;background:var(--teal);color:white;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;}

    /* HEADER */
    .coach-header{background:linear-gradient(135deg,var(--teal-deep),var(--teal-dark));padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;flex-wrap:wrap;}
    .coach-brand{display:flex;align-items:center;gap:12px;}
    .coach-logo{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.7rem;color:white;}
    .coach-title{color:white;font-size:1.1rem;font-weight:700;}
    .coach-sub{color:rgba(255,255,255,0.5);font-size:0.72rem;}
    .coach-metrics{display:flex;gap:8px;flex-wrap:wrap;}
    .coach-metric{background:rgba(255,255,255,0.1);padding:6px 14px;border-radius:100px;color:white;font-size:0.78rem;font-weight:600;display:flex;align-items:center;gap:5px;}
    .coach-metric .num{font-size:1.1rem;font-weight:800;}
    .coach-back{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);padding:8px 14px;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;}
    .coach-back:hover{background:rgba(255,255,255,0.2);color:white;}

    /* LAYOUT */
    .coach-layout{flex:1;display:flex;overflow:hidden;}

    /* TABS (mobile) */
    .coach-tabs{display:none;background:white;border-bottom:1px solid var(--gray-100);flex-shrink:0;}
    .coach-tab{flex:1;padding:12px;text-align:center;font-size:0.85rem;font-weight:700;color:var(--gray-500);cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
    .coach-tab.active{color:var(--teal-dark);border-bottom-color:var(--teal);}

    /* ROADMAP PANEL */
    .roadmap-panel{width:380px;background:white;border-right:1px solid var(--gray-100);overflow-y:auto;flex-shrink:0;padding:20px;-webkit-overflow-scrolling:touch;}
    .roadmap-title{font-size:0.95rem;font-weight:800;color:var(--slate);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
    .roadmap-progress{font-size:0.75rem;color:var(--gray-500);font-weight:600;}

    .phase{margin-bottom:12px;border:1px solid var(--gray-100);border-radius:14px;overflow:hidden;}
    .phase-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background 0.15s;}
    .phase-header:hover{background:var(--gray-100);}
    .phase-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:800;color:white;flex-shrink:0;}
    .phase-num.active{background:var(--teal);}
    .phase-num.upcoming{background:var(--gray-300);}
    .phase-num.completed{background:#48BB78;}
    .phase-info{flex:1;}
    .phase-name{font-size:0.85rem;font-weight:700;color:var(--slate);}
    .phase-time{font-size:0.7rem;color:var(--gray-500);}
    .phase-chevron{color:var(--gray-300);transition:transform 0.2s;font-size:0.8rem;}
    .phase.open .phase-chevron{transform:rotate(90deg);}
    .phase-body{display:none;padding:0 16px 14px;}
    .phase.open .phase-body{display:block;}

    .milestone{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);}
    .milestone:last-child{border-bottom:none;}
    .ms-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--gray-300);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.15s;}
    .ms-check.in_progress{border-color:var(--gold);background:rgba(232,184,75,0.1);}
    .ms-check.in_progress::after{content:'';width:8px;height:8px;border-radius:2px;background:var(--gold);}
    .ms-check.completed{border-color:#48BB78;background:#48BB78;}
    .ms-check.completed::after{content:'\\2713';color:white;font-size:0.7rem;font-weight:800;}
    .ms-check.blocked{border-color:var(--pink);background:rgba(232,140,160,0.1);}
    .ms-check.blocked::after{content:'!';color:var(--pink);font-size:0.7rem;font-weight:800;}
    .ms-info{flex:1;min-width:0;}
    .ms-title{font-size:0.82rem;font-weight:600;color:var(--slate);line-height:1.3;}
    .ms-desc{font-size:0.72rem;color:var(--gray-500);margin-top:2px;line-height:1.4;}
    .ms-tag{display:inline-block;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:2px 6px;border-radius:4px;margin-top:4px;}
    .ms-tag.critical{background:rgba(232,140,160,0.12);color:var(--pink);}
    .ms-tag.important{background:rgba(232,184,75,0.12);color:#B8860B;}
    .ms-tag.normal{background:rgba(42,171,179,0.1);color:var(--teal-dark);}

    /* CHAT PANEL */
    .chat-panel{flex:1;display:flex;flex-direction:column;background:var(--sand);min-width:0;}
    .chat-messages{flex:1;overflow-y:auto;padding:20px 24px;-webkit-overflow-scrolling:touch;}
    .chat-msg{margin-bottom:16px;max-width:92%;}
    .chat-msg.user{margin-left:auto;}
    .chat-msg.assistant{margin-right:auto;}
    .chat-bubble{padding:14px 18px;border-radius:16px;font-size:0.9rem;line-height:1.65;word-wrap:break-word;}
    .chat-msg.user .chat-bubble{background:var(--teal);color:white;border-bottom-right-radius:4px;}
    .chat-msg.assistant .chat-bubble{background:white;color:var(--slate);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
    .chat-bubble h2{font-size:1rem;margin:12px 0 6px;color:var(--teal-deep);}
    .chat-bubble h3{font-size:0.92rem;margin:10px 0 4px;color:var(--teal-dark);}
    .chat-bubble h4{font-size:0.88rem;margin:8px 0 4px;color:var(--slate);}
    .chat-bubble strong{color:var(--teal-deep);}
    .chat-msg.assistant .chat-bubble strong{color:var(--teal-deep);}
    .chat-bubble ul,.chat-bubble ol{margin:6px 0 6px 20px;}
    .chat-bubble li{margin-bottom:4px;}
    .chat-bubble p{margin-bottom:8px;}
    .chat-bubble p:last-child{margin-bottom:0;}
    .chat-bubble hr{border:none;border-top:1px solid var(--gray-100);margin:12px 0;}
    .chat-sender{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;padding:0 4px;}
    .chat-msg.user .chat-sender{color:rgba(255,255,255,0.5);text-align:right;}
    .chat-msg.assistant .chat-sender{color:var(--teal-dark);}

    .chat-typing{display:flex;align-items:center;gap:4px;padding:8px 18px;}
    .chat-typing span{width:6px;height:6px;border-radius:50%;background:var(--gray-300);animation:blink 1.4s ease infinite;}
    .chat-typing span:nth-child(2){animation-delay:0.2s;}
    .chat-typing span:nth-child(3){animation-delay:0.4s;}
    @keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}

    /* CHAT INPUT */
    .chat-input-wrap{padding:16px 24px;background:white;border-top:1px solid var(--gray-100);flex-shrink:0;}
    .chat-input-row{display:flex;gap:10px;max-width:100%;}
    .chat-input{flex:1;padding:14px 18px;border:2px solid var(--gray-100);border-radius:14px;font-size:0.92rem;font-family:inherit;resize:none;color:var(--slate);min-height:50px;max-height:140px;line-height:1.4;}
    .chat-input:focus{outline:none;border-color:var(--teal);}
    .chat-input::placeholder{color:var(--gray-300);}
    .chat-send{padding:14px 20px;background:var(--teal);color:white;border:none;border-radius:14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.85rem;white-space:nowrap;transition:background 0.15s;align-self:flex-end;}
    .chat-send:hover{background:var(--teal-dark);}
    .chat-send:disabled{background:var(--gray-300);cursor:not-allowed;}
    .chat-actions{display:flex;gap:8px;margin-top:8px;}
    .chat-action-btn{background:none;border:1px solid var(--gray-100);color:var(--gray-500);font-size:0.72rem;font-weight:600;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
    .chat-action-btn:hover{border-color:var(--teal);color:var(--teal);}

    /* RESPONSIVE */
    @media(max-width:900px){
      .coach-tabs{display:flex;}
      .roadmap-panel{display:none;width:100%;border-right:none;}
      .chat-panel{display:flex;}
      .roadmap-panel.visible{display:block;}
      .chat-panel.hidden{display:none;}
      .coach-layout{flex-direction:column;}
      .coach-metrics{display:none;}
    }
    @media(max-width:600px){
      .coach-header{padding:12px 16px;}
      .chat-messages{padding:16px;}
      .chat-input-wrap{padding:12px 16px;}
      .roadmap-panel{padding:16px;}
    }

    /* SCROLLBAR */
    .chat-messages::-webkit-scrollbar,.roadmap-panel::-webkit-scrollbar{width:5px;}
    .chat-messages::-webkit-scrollbar-thumb,.roadmap-panel::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}
  </style>
</head>

  </div>

<script>

function getDefaultRoadmap() {
  return { phases: [
    { id:1, name:'Fix the Foundation', time:'Apr — May 2026', status:'active', open:true, milestones:[
      {id:'m1',title:'Go weekly — stop biweekly',desc:'Biweekly kills momentum. You can\'t build a launch culture on an every-other-week rhythm. Even if the food budget is tight, meet weekly.',status:'not_started',priority:'critical'},
      {id:'m2',title:'Solve the culture gap',desc:'Young families don\'t enjoy the current vibe. Redesign the room — music, energy, conversation topics, table groupings. This is your #1 retention issue.',status:'not_started',priority:'critical'},

// ============================================================
// SYSTEM PROMPT
// ============================================================
function buildSystemPrompt(metrics) {
  const m = metrics || {};
  const roadmap = state.roadmap || getDefaultRoadmap();
  const completedCount = roadmap.phases.reduce((sum, p) => sum + p.milestones.filter(ms => ms.status === 'completed').length, 0);
  const totalCount = roadmap.phases.reduce((sum, p) => sum + p.milestones.length, 0);

  return `You are a senior church planting consultant and strategic coach for Kody Countryman and the St. Pete Bible Study campus launch team. You have deep expertise in the ARC (Association of Related Churches) church planting methodology and multisite campus launches. You think like the best church planting coaches in the country.

## YOUR PERSONALITY
- Direct, strategic, no-fluff. You're the $500/hr consultant who earns it by being honest.
- You ask hard questions that force clarity and action
- You give SPECIFIC, actionable next steps — not vague "pray about it" advice
- You think in systems, timelines, and accountability
- You push back when the plan doesn't match reality
- You celebrate wins genuinely
- You speak conversationally, not formally. Like a mentor over coffee.
- You reference their specific data, names, and context — never generic advice
- Keep responses focused and concise. Don't write essays unless asked to go deep.

## CHURCH CONTEXT — THIS IS YOUR CLIENT

### The Vision
St. Pete Bible Study is a Grace Family Church (GFC) campus launch in St. Petersburg/Pinellas Park, FL. The goal: launch as a full GFC campus with Sunday services + weeknight specialized groups (men's, women's, youth, couples). Target: 300+ at launch, 1000+ within year one.

### Current State (as of ${new Date().toLocaleDateString('en-US', {month:'long', year:'numeric'})})
- Meeting every other Thursday night in Dewayne's business conference room
- Venue capacity: 60-70 people
- Average attendance: ~30 people
- 140 unique people have come through in the past year
- RETENTION IS THE #1 PROBLEM — 21% retention rate

### Real-Time Data from Their Database
- Total people in system: ${m.totalPeople || '~30'}
- Recent attendance: ${m.recentAttendance || 'Not available'}
- People needing follow-up: ${m.followupCount || 'Unknown'}
- Pipeline breakdown: ${m.pipeline || 'Not available'}
- Leaders identified: ${m.leaders || 'Unknown'}
- Microgroups active: ${m.groups || '0'}

### Roadmap Progress
- Milestones completed: ${completedCount} / ${totalCount}
- Current phase: ${roadmap.phases.find(p => p.status === 'active')?.name || 'Phase 1'}

async function init() {
  // Load saved state
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (saved) {
    state.messages = saved.messages || [];
    state.roadmap = saved.roadmap || getDefaultRoadmap();

function saveApiKey() {

  if (!key) return;
  state.apiKey = key;
  localStorage.setItem('stpete_claude_key', key);
  document.getElementById('keyModal').style.display = 'none';

    roadmap: state.roadmap

// ============================================================
async function fetchMetrics() {
  try {
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
    const [peopleRes, attRes, groupsRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/people?select=id,status,stage,needs_followup,followup_done`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/attendance?order=date.desc&limit=6`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/microgroups?select=id`, { headers })
    ]);
    const people = await peopleRes.json();
    const attendance = await attRes.json();
    const groups = await groupsRes.json();

    const pipeline = {};
    people.forEach(p => { pipeline[p.stage] = (pipeline[p.stage]||0) + 1; });

    state.metrics = {
      totalPeople: people.length,
      followupCount: people.filter(p => p.needs_followup && !p.followup_done).length,
      leaders: people.filter(p => p.status === 'leader' || p.status === 'core').length,
      consistent: people.filter(p => ['consistent','core','leader'].includes(p.status)).length,
      groups: groups.length,
      recentAttendance: attendance.slice(0,6).map(a =>
        `${a.date}: ${(a.checked_in||[]).length} checked in`
      ).join('; ') || 'No recent data',
      pipeline: Object.entries(pipeline).map(([k,v]) => `${k}: ${v}`).join(', ') || 'No data'
    };
  } catch(err) {
    console.error('Metrics fetch failed:', err);
    state.metrics = {};
  }
}

function renderHeaderMetrics() {
  const m = state.metrics;
  const el = document.getElementById('headerMetrics');
  if (!m.totalPeople) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="coach-metric"><span class="num">${m.totalPeople}</span> people</div>
    <div class="coach-metric"><span class="num">${m.consistent || 0}</span> consistent</div>
    <div class="coach-metric"><span class="num">${m.leaders || 0}</span> leaders</div>
    <div class="coach-metric"><span class="num">${m.followupCount || 0}</span> follow-ups</div>
    <div class="coach-metric"><span class="num">${m.groups || 0}</span> groups</div>
  `;
}

function renderRoadmap() {
  const panel = document.getElementById('roadmapPanel');
  const rm = state.roadmap;
  const completedCount = rm.phases.reduce((s,p) => s + p.milestones.filter(ms => ms.status === 'completed').length, 0);
  const totalCount = rm.phases.reduce((s,p) => s + p.milestones.length, 0);

  panel.innerHTML = `
    <div class="roadmap-title">
      Launch Roadmap
      <span class="roadmap-progress">${completedCount}/${totalCount} complete</span>
    </div>
    ${rm.phases.map(phase => `
      <div class="phase ${phase.open ? 'open' : ''}" id="phase-${phase.id}">
        <div class="phase-header" onclick="togglePhase(${phase.id})">
          <div class="phase-num ${phase.status}">${phase.id}</div>
          <div class="phase-info">
            <div class="phase-name">${phase.name}</div>
            <div class="phase-time">${phase.time} · ${phase.milestones.filter(ms=>ms.status==='completed').length}/${phase.milestones.length}</div>
          </div>
          <span class="phase-chevron">&#9654;</span>
        </div>
        <div class="phase-body">
          ${phase.milestones.map(ms => `
            <div class="milestone">
              <div class="ms-check ${ms.status}" onclick="cycleMilestone('${ms.id}')" title="Click to change status"></div>
              <div class="ms-info">
                <div class="ms-title">${ms.title}</div>
                <div class="ms-desc">${ms.desc}</div>
                ${ms.priority ? `<span class="ms-tag ${ms.priority}">${ms.priority}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function togglePhase(id) {
  const phase = state.roadmap.phases.find(p => p.id === id);
  if (phase) { phase.open = !phase.open; renderRoadmap(); saveState(); }
}

function cycleMilestone(msId) {
  const cycle = ['not_started', 'in_progress', 'completed', 'blocked'];
  for (const phase of state.roadmap.phases) {
    const ms = phase.milestones.find(m => m.id === msId);
    if (ms) {
      const idx = cycle.indexOf(ms.status);
      ms.status = cycle[(idx + 1) % cycle.length];
      renderRoadmap();
      saveState();
      return;
    }
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || state.streaming) return;

  if (!state.apiKey) {
    document.getElementById('keyModal').style.display = 'flex';
    return;
  }

  // Add user message
  state.messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  // Show typing indicator
  state.streaming = true;
  document.getElementById('sendBtn').disabled = true;
  const container = document.getElementById('chatMessages');
  const typingEl = document.createElement('div');
  typingEl.className = 'chat-msg assistant';
  typingEl.innerHTML = `
    <div class="chat-sender">Launch Coach</div>
    <div class="chat-bubble"><div class="chat-typing"><span></span><span></span><span></span></div></div>
  `;
  container.appendChild(typingEl);
  scrollChat();

  try {
    // Refresh metrics before each call
    await fetchMetrics();

    const systemPrompt = buildSystemPrompt(state.metrics);

    // Build messages array (keep last 30 messages for context window management)
    const apiMessages = state.messages.slice(-30).map(m => ({
      role: m.role,
      content: m.content
    }));

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: CLAUDE_MODEL,
        max_tokens: 4096,
        system: systemPrompt,
        stream: true,
        messages: apiMessages
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API error ${response.status}: ${errText}`);
    }

    // Stream the response
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let assistantText = '';
    let buffer = '';

    // Replace typing indicator with streaming bubble
    typingEl.innerHTML = `
      <div class="chat-sender">Launch Coach</div>
      <div class="chat-bubble" id="streamBubble"></div>
    `;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6).trim();
        if (jsonStr === '[DONE]') continue;
        try {
          const data = JSON.parse(jsonStr);
          if (data.type === 'content_block_delta' && data.delta?.text) {
            assistantText += data.delta.text;
            document.getElementById('streamBubble').innerHTML = md(assistantText);
            scrollChat();
          }
        } catch(e) { /* skip malformed chunks */ }
      }
    }

    // Finalize
    state.messages.push({ role: 'assistant', content: assistantText });
    saveState();
    renderMessages();

  } catch(err) {
    console.error('Chat error:', err);
    typingEl.querySelector('.chat-bubble').innerHTML = `<span style="color:var(--pink);">Error: ${escHtml(err.message)}</span>`;
    if (err.message.includes('401') || err.message.includes('invalid')) {
      localStorage.removeItem('stpete_claude_key');
      state.apiKey = '';
      setTimeout(() => document.getElementById('keyModal').style.display = 'flex', 1500);
    }
  } finally {
    state.streaming = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ============================================================
// MARKDOWN RENDERER (lightweight)
// ============================================================
function md(text) {
  if (!text) return '';
  let html = escHtml(text);
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Bold + Italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Horizontal rule
  html = html.replace(/^---$/gm, '<hr>');
  // Numbered lists
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Bullet lists
  html = html.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Paragraphs
  html = html.replace(/\n{2,}/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<h[234]>)/g, '$1');
  html = html.replace(/(<\/h[234]>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)\s*<\/p>/g, '$1');
  html = html.replace(/<p>\s*(<hr>)\s*<\/p>/g, '$1');
  return html;
}

function escHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
